<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Auralis</title>
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }
    html, body { margin: 0; }
    html { height: 100%; }
    body {
      min-height: 100%;
      background: #0f0f0d;
      color: #f3efe6;
      font-family: "Aptos", "Segoe UI", system-ui, -apple-system, sans-serif;
      display: grid;
      place-items: center;
      align-content: center;
      /* env() insets clear the notch / home-indicator (viewport-fit=cover). */
      padding:
        calc(24px + env(safe-area-inset-top))
        calc(24px + env(safe-area-inset-right))
        calc(24px + env(safe-area-inset-bottom))
        calc(24px + env(safe-area-inset-left));
      -webkit-font-smoothing: antialiased;
      /* Allow the page to scroll so the button isn't trapped behind the soft keyboard. */
      overflow-y: auto;
    }
    .card { width: 100%; max-width: 360px; margin: auto; }
    .mark {
      width: 56px; height: 56px; border-radius: 14px; background: #EDE3CF; color: #151411;
      display: grid; place-items: center; font-weight: 900; font-size: 28px; margin: 0 auto 20px;
    }
    h1 { font-size: 20px; font-weight: 900; letter-spacing: -0.02em; text-align: center; margin: 0 0 4px; }
    p.sub { color: #a49b8d; font-size: 13px; text-align: center; margin: 0 0 24px; }
    label { display: block; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: #70695f; margin-bottom: 8px; }
    input {
      width: 100%; min-height: 48px; background: #1b1a16; border: 1px solid rgba(237,227,207,0.14); color: #f3efe6;
      border-radius: 8px; padding: 13px 14px; font-size: 15px; outline: none;
    }
    input:focus { border-color: rgba(237,227,207,0.4); }
    button {
      width: 100%; min-height: 48px; margin-top: 16px; background: #EDE3CF; color: #151411; border: 0;
      border-radius: 8px; padding: 14px; font-size: 15px; font-weight: 800; cursor: pointer;
      display: inline-flex; align-items: center; justify-content: center; gap: 8px;
    }
    button:active { transform: translateY(1px); }
    button:disabled { opacity: 0.65; cursor: progress; transform: none; }
    .spinner {
      width: 16px; height: 16px; border-radius: 50%;
      border: 2px solid rgba(21,20,17,0.3); border-top-color: #151411;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    @media (prefers-reduced-motion: reduce) { .spinner { animation: none; } }
    /* Neutral by default; .is-error switches to the red signal. */
    .err { color: #a49b8d; font-size: 12.5px; margin-top: 12px; min-height: 16px; text-align: center; }
    .err.is-error { color: #e25b50; }
    .hint { color: #70695f; font-size: 12.5px; margin-top: 18px; text-align: center; line-height: 1.5; }
  </style>
</head>
<body>
  <div class="card">
    <div class="mark">A</div>
    <h1>Connect to Auralis</h1>
    <p class="sub">Enter the address of your self-hosted Auralis server.</p>
    <label for="url">Server address</label>
    <input id="url" type="url" inputmode="url" autocapitalize="off" autocorrect="off"
           placeholder="http://192.168.1.20:4237" />
    <button id="go"><span id="goLabel">Connect</span></button>
    <div class="err" id="err" aria-live="polite"></div>
    <p class="hint">Run Auralis on your computer, then enter its LAN address here.<br/>The app remembers it for next time.</p>
  </div>
  <script>
    var KEY = "auralis.serverBase";
    var input = document.getElementById("url");
    var err = document.getElementById("err");
    var go = document.getElementById("go");
    var goLabel = document.getElementById("goLabel");

    // In-progress / informational status: muted, not red.
    function setStatus(text) {
      err.classList.remove("is-error");
      err.textContent = text;
    }
    // Actual failures: red signal.
    function setError(text) {
      err.classList.add("is-error");
      err.textContent = text;
    }

    function setLoading(loading) {
      go.disabled = loading;
      if (loading) {
        goLabel.textContent = "Connexion…";
        if (!go.querySelector(".spinner")) {
          var s = document.createElement("span");
          s.className = "spinner";
          s.setAttribute("aria-hidden", "true");
          go.insertBefore(s, goLabel);
        }
      } else {
        goLabel.textContent = "Connect";
        var existing = go.querySelector(".spinner");
        if (existing) go.removeChild(existing);
      }
    }

    function normalize(value) {
      var v = (value || "").trim();
      if (!v) return "";
      if (!/^https?:\/\//i.test(v)) v = "http://" + v;
      return v.replace(/\/+$/, "");
    }

    function connect(base) {
      try { localStorage.setItem(KEY, base); } catch (e) {}
      // Navigate the WebView to the self-hosted server; same-origin /api then works.
      window.location.href = base + "/";
    }

    // Auto-reconnect if we already know the server.
    var saved = "";
    try { saved = localStorage.getItem(KEY) || ""; } catch (e) {}
    if (saved) { input.value = saved; }

    // Reachability check that tolerates CORS: try a normal request first, then a
    // no-cors probe (which resolves for any reachable server).
    function probe(base) {
      return fetch(base + "/api/health", { cache: "no-store" })
        .then(function (r) { return r.ok; })
        .catch(function () {
          return fetch(base + "/api/health", { mode: "no-cors", cache: "no-store" })
            .then(function () { return true; })
            .catch(function () { return false; });
        });
    }

    go.addEventListener("click", function () {
      if (go.disabled) return; // guard against duplicate taps
      var base = normalize(input.value);
      if (!base) { setError("Please enter a server address."); return; }
      setStatus("Connecting…");
      setLoading(true);
      probe(base).then(function (ok) {
        if (ok) {
          connect(base); // navigates away; leave the button in its loading state
        } else {
          setLoading(false);
          setError("Could not reach that server. Check the address and that Auralis is running.");
        }
      }).catch(function () {
        setLoading(false);
        setError("Could not reach that server. Check the address and that Auralis is running.");
      });
    });

    input.addEventListener("keydown", function (e) { if (e.key === "Enter") go.click(); });
  </script>
</body>
</html>
