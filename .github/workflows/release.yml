name: Build and Release Desktop Apps

on:
  push:
    tags:
      - 'v*' # Se déclenche quand tu crées un tag (ex: v1.4.0)
  workflow_dispatch: # Permet de lancer la compilation manuellement depuis GitHub

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]

    runs-on: ${{ matrix.os }}

    permissions:
      contents: write # Permet à l'action de publier sur la page "Releases"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # electron-builder publishes under v${package.json.version} while the Android
      # job uploads to ${GITHUB_REF_NAME}. If the tag and package.json disagree the
      # desktop and APK assets land on different releases. Fail fast instead.
      - name: Verify tag matches package.json version
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          PKG="v$(node -p "require('./package.json').version")"
          if [ "$PKG" != "$GITHUB_REF_NAME" ]; then
            echo "::error::Tag $GITHUB_REF_NAME does not match package.json ($PKG)"
            exit 1
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      # The committed package-lock.json is generated on Linux and only records
      # the Linux native binaries for optional deps (lightningcss, @next/swc,
      # @tailwindcss/oxide…). On Windows/macOS npm then skips the matching
      # platform binary and the build fails with "Cannot find module
      # lightningcss.win32-x64-msvc.node". Resolve per-runner instead.
      - name: Install dependencies
        shell: bash
        run: |
          rm -f package-lock.json
          npm install

      - name: Prepare Web App
        run: npm run build

      - name: Prepare Desktop
        run: npm run desktop:prepare

      - name: Build and Publish Electron App
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-builder --publish always

  # Build the native Android APK and attach it to the same release. Runs after the
  # desktop build has created/published the release (gh release upload only ADDS the
  # asset — it never touches the release notes electron-builder wrote).
  android:
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - uses: android-actions/setup-android@v3
      - name: Install dependencies
        run: npm ci
      - name: Build native Android APK
        # Stamp the APK with the release tag so the in-app updater can compare the
        # running version against the latest GitHub release (see UpdateManager.kt).
        env:
          AURALIS_VERSION: ${{ github.ref_name }}
        run: npm run mobile:native
      - name: Attach APK to the release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cp android-native/app/build/outputs/apk/release/app-release.apk "Auralis-${GITHUB_REF_NAME}.apk"
          gh release upload "${GITHUB_REF_NAME}" "Auralis-${GITHUB_REF_NAME}.apk" --clobber

  # Regenerate and redeploy the APT repository once the .deb is attached to the
  # release. The `on: release` trigger in apt-repo.yml never fires here because the
  # release is published with the default GITHUB_TOKEN, and GitHub deliberately
  # blocks workflow chaining from GITHUB_TOKEN-created events. workflow_dispatch is
  # the documented exception, so we dispatch it explicitly. Runs last so the new
  # .deb is already in the release before the pool is rebuilt.
  apt-repo:
    runs-on: ubuntu-latest
    needs: [build, android]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      actions: write
    steps:
      - name: Trigger APT repository rebuild
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run apt-repo.yml --repo "${GITHUB_REPOSITORY}" --ref main
